<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="refresh" content="3; url=https://ks-c.github.io/dsm5-decision-trees/dsm5_handbook_web/index.html">
  <title>DSM-5® 决策树</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .card {
      background: white;
      padding: 2.5rem 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
      color: #1a1a1a;
    }
    p {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 0.75rem 2rem;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      transition: transform 0.2s, background 0.2s;
    }
    .btn:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }
    .hint {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #999;
    }
    .hint code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌳 DSM-5® 交互式决策树</h1>
    <p>基于《DSM-5® 鉴别诊断手册》的辅助诊断工具。<br>纯静态 · 零依赖 · 可离线</p>
    <a href="https://ks-c.github.io/dsm5-decision-trees/dsm5_handbook_web/index.html" class="btn" id="go">立即进入</a>
    <div class="hint" id="timer">3 秒后自动跳转…</div>
    <div class="hint" style="margin-top:0.5rem">
      本地运行：<code>python app.py</code>
    </div>
  </div>

  <script>
    let s = 3;
    const t = setInterval(() => {
      s--;
      document.getElementById('timer').textContent = s > 0 ? `${s} 秒后自动跳转…` : '跳转中...';
    }, 1000);
    setTimeout(() => window.location.replace('https://ks-c.github.io/dsm5-decision-trees/dsm5_handbook_web/index.html'), 3000);
    document.getElementById('go').onclick = () => {
      clearInterval(t);
      window.location.replace('https://ks-c.github.io/dsm5-decision-trees/dsm5_handbook_web/index.html');
    };
  </script>
</body>
</html>
